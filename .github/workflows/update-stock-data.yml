name: Update stock data

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-stock-data.yml"
      - "scripts/update-stock-data.mjs"
      - "data/stock-list.json"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Update stock data
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_APP_SECRET: ${{ secrets.KIWOOM_APP_SECRET }}
          KIWOOM_BASE_URL: ${{ vars.KIWOOM_BASE_URL }}
          KIWOOM_BASE_URLS: ${{ vars.KIWOOM_BASE_URLS }}
          KIWOOM_MARKETS: ${{ vars.KIWOOM_MARKETS }}
          KIWOOM_REQUIRE_UNIVERSE: ${{ vars.KIWOOM_REQUIRE_UNIVERSE }}
          KIWOOM_STOCK_INFO_PATH: ${{ vars.KIWOOM_STOCK_INFO_PATH }}
        run: npm run update

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/stocks.json
          git commit -m "Update stock data" || echo "No changes"
          git push
