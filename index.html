<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>모바일 주식 재무정보</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Naver Finance + OpenDART</p>
      <h1>주식 재무정보</h1>
    </div>
    <button id="refreshBtn" class="ghost-btn" type="button">새로고침</button>
  </header>

  <main>
    <section class="search-card">
      <label for="stockSearch">종목 검색</label>
      <div class="search-row">
        <input id="stockSearch" type="search" list="stockSearchOptions" placeholder="예: 삼성전자, 005930" autocomplete="off" />
        <datalist id="stockSearchOptions"></datalist>
        <select id="stockSelect" aria-label="종목 선택"></select>
      </div>
      <p id="updatedAt" class="muted"></p>
    </section>

    <section class="summary-card">
      <div class="title-row">
        <div>
          <h2 id="stockName">-</h2>
          <p id="stockDesc" class="muted"></p>
        </div>
        <div class="price-box">
          <span>현재가</span>
          <strong id="currentPrice">-</strong>
          <small id="changeRate">-</small>
        </div>
      </div>

      <div id="metricGrid" class="metric-grid"></div>
    </section>

    <section class="panel">
      <button class="accordion" type="button" data-target="peerPanel">
        동종업계 비교
        <span>열기</span>
      </button>
      <div id="peerPanel" class="panel-body">
        <div id="peerBars" class="bars"></div>
        <div class="table-wrap">
          <table id="peerTable"></table>
        </div>
      </div>
    </section>

    <section class="panel">
      <button class="accordion" type="button" data-target="annualPanel">
        연도별 실적
        <span>열기</span>
      </button>
      <div id="annualPanel" class="panel-body">
        <div class="table-wrap">
          <table id="annualTable"></table>
        </div>
      </div>
    </section>

    <section class="panel">
      <button class="accordion" type="button" data-target="quarterPanel">
        분기별 실적
        <span>열기</span>
      </button>
      <div id="quarterPanel" class="panel-body">
        <div class="table-wrap">
          <table id="quarterTable"></table>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>GitHub Actions가 네이버 금융과 OpenDART에서 조회해 <code>data/stocks.json</code>을 갱신합니다.</p>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
